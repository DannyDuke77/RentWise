services:
  db:
    image: postgres:16
    volumes:
      - rentwise_postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${SQL_DATABASE}
      POSTGRES_USER: ${SQL_USER}
      POSTGRES_PASSWORD: ${SQL_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SQL_USER} -d ${SQL_DATABASE}"]
      interval: 3s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./rentwise
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./rentwise:/usr/src/rentwise
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  rentwise_postgres_data: